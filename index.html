<DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="box">
        <h3>calculator</h3>
        <input type="number" id="num1" placeholder="1">
        
        <select id="action">
            <option value="add">+</option>
            <option value="subtract">-</option>
            <option value="multiply">*</option>
            <option value="divide">/</option>
        </select>
        
        <input type="number" id="num2" placeholder="2">
        <button onclick="doCal()">คำนวณ</button>
        
        <div id="calResult" class="result"></div>
    </div>

    <script>
        function doCal() {
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;
            const act = document.getElementById('action').value;

        fetch(`http://localhost:3000/calculate?num1=${n1}&num2=${n2}&action=${act}`)
            .then(res => res.json())
            .then(data => {
            if (data.error) {
                document.getElementById('calResult').innerText = "Error: " + data.error;
                    } else {
                    document.getElementById('calResult').innerText = "Result: " + data.result;
                    }
                })
        }
    </script>
</body>
</html>
